name: Release Launcher

on:
  push:
    tags:
      - "launcher-v*"
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifacts: launcherApp/desktopApp/build/compose/binaries/main/dmg/*.dmg
          - os: windows-latest
            artifacts: |
              launcherApp/desktopApp/build/compose/binaries/main/msi/*.msi
              launcherApp/desktopApp/build/compose/binaries/main/exe/*.exe
          - os: ubuntu-latest
            artifacts: |
              launcherApp/desktopApp/build/compose/binaries/main/deb/*.deb
              launcherApp/desktopApp/build/compose/binaries/main/rpm/*.rpm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # RPM packaging requires rpm-build tools on Debian-based runners
      - name: Install rpm tooling
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build installers
        run: ./gradlew :launcherApp:desktopApp:packageDistributionForCurrentOS

      - uses: actions/upload-artifact@v4
        with:
          name: azora-launcher-${{ runner.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
